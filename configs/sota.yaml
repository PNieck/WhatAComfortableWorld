general:
  seed: 42

model:
  name: "main_model"
  input_model_path: "2025-11-19-16:52:05_main_gpt2_25_layers_training"
  type: "gpt2"
  max_seq_len: 320
  with_xy_indices: True
  with_corner_indices: True

training:
  loop_type: "custom"
  epochs: 150
  lr: 1e-5
  batch_size: 32
  eval_steps: 500
  log_comment: "_main_training"

inference:
  use_masked_inference: True
