general:
  seed: 42

paths:
  input_data: "./data/gpt2_fast_test/input"

preprocessing:
  test_size: 0.1
  validate_size: 0.1
  max_floor_plans: 1000
  data_augmentation:
    - permutation:
        percentage: 0.4
    - symmetry:
        percentage: 0.4
    - rotation:
        percentage: 0.4

model:
  name: "fast_test_model_gpt2"
  type: "gpt2"
  with_xy_indices: True
  max_seq_len: 320
  n_layer: 12
  n_head: 8
  n_embd: 256

training:
  loop_type: "custom"
  epochs: 10
  lr: 1e-6
  batch_size: 32
  eval_steps: 2
  checkpointing_frequency: 4  # checkpoint every n epochs
  log_comment: "_fast_test_training"
