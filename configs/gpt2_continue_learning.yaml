general:
  seed: 42

paths:
  input_data: "./data/gpt2_main/input/"
  output_data: "./data/gpt2_main/output/"
  trained_model: "./models/gpt2_continued_with_coords/"

preprocessing:
  test_size: 0.05
  validate_size: 0.005
  data_augmentation:
    - permutation:
        percentage: 0.4
    - symmetry:
        percentage: 0.4
    - rotation:
        percentage: 0.4

model:
  input_model_path: "2025-11-19-01:43:50_fast_test_training"
  max_seq_len: 320

training:
  loop_type: "custom"
  epochs: 60
  lr: 1e-5
  batch_size: 32
  eval_steps: 500
  log_comment: "_main_gpt2_continue_training_with_coords"
