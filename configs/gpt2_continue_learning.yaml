general:
  seed: 42

paths:
  input_data: "./data/gpt2_fast_test/input"

preprocessing:
  test_size: 0.05
  validate_size: 0.005
  data_augmentation:
    - permutation:
        percentage: 0.4
    - symmetry:
        percentage: 0.4
    - rotation:
        percentage: 0.4

model:
  input_model_path: "2026-01-02-19:22:20_fast_test_training"
  from_checkpoint: True
  checkpoint_epoch: 3
  max_seq_len: 320

training:
  loop_type: "custom"
  epochs: 10
  lr: 1e-4
  batch_size: 32
  eval_steps: 2
  checkpointing_frequency: 3  # checkpoint every n epochs
  log_comment: "_fast_test_training"
  lr_scheduler:
    type: "cyclic"
    base_lr: 1e-8
    max_lr: 1e-4
    cycles: 3
