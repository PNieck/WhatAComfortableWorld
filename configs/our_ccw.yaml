general:
  seed: 42

model:
  with_vertex_indices: True
  with_xy_indices: True
  max_seq_len: 320
  n_layer: 25
  n_head: 16
  n_embd: 256   # embedding and hidden states dimension

training:
  input_data: "./data/main_ccw/"
  epochs: 150
  lr: 1e-5
  batch_size: 32
  eval_steps: 500
  log_comment: "_our_ccw"
  checkpointing_frequency: 10  # checkpoint every n epochs
  loss: "VertexDistancesErgoLoss"
  lr_scheduler:
    type: "cyclic"
    base_lr: 1e-12
    max_lr: 1e-5
    cycles: 3
